<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSocket Test - FYP Project</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        h1 { margin-top: 0; text-align: center; }
        #status {
            padding: 15px;
            margin: 20px 0;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            font-size: 18px;
        }
        .connected {
            background: rgba(76, 175, 80, 0.3);
            border: 2px solid #4CAF50;
        }
        .disconnected {
            background: rgba(244, 67, 54, 0.3);
            border: 2px solid #f44336;
        }
        .connecting {
            background: rgba(255, 193, 7, 0.3);
            border: 2px solid #FFC107;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            margin: 5px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #messages {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            margin-top: 20px;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
        }
        .message {
            padding: 10px;
            margin: 5px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            border-left: 4px solid #667eea;
        }
        .input-group {
            margin: 20px 0;
        }
        input[type="text"] {
            padding: 12px;
            width: 100%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }
        input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }
        .info-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        .info-box code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            color: #FFD700;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 WebSocket Connection Test</h1>
        
        <div class="info-box">
            <strong>📍 Backend URL:</strong>
            <input type="text" id="wsUrl" placeholder="https://your-ngrok-url.ngrok-free.app" 
                   value="http://localhost:5001">
            <button onclick="connect()">🔌 Connect</button>
            <button onclick="disconnect()">🔴 Disconnect</button>
        </div>
        
        <div id="status" class="connecting">⏳ Not Connected</div>
        
        <div>
            <h2>🧪 Test Actions</h2>
            <button onclick="testMessage()">📨 Send Test Message</button>
            <button onclick="testProgress()">📊 Test Video Progress</button>
            <button onclick="callProgressAPI()">🎬 Call Progress API</button>
            <button onclick="clearMessages()">🗑️ Clear Messages</button>
        </div>
        
        <div>
            <h2>📬 Messages</h2>
            <div id="messages"></div>
        </div>
    </div>

    <script>
        let socket = null;
        
        function getWsUrl() {
            return document.getElementById('wsUrl').value.trim();
        }
        
        function updateStatus(message, className) {
            const statusDiv = document.getElementById('status');
            statusDiv.textContent = message;
            statusDiv.className = className;
        }
        
        function addMessage(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'message';
            const timestamp = new Date().toLocaleTimeString();
            div.innerHTML = `<strong>[${timestamp}]</strong> ${msg}`;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }
        
        function connect() {
            if (socket?.connected) {
                addMessage('⚠️ Already connected!', 'warning');
                return;
            }
            
            const wsUrl = getWsUrl();
            updateStatus('⏳ Connecting to ' + wsUrl + '...', 'connecting');
            addMessage('🔌 Connecting to: ' + wsUrl);
            
            socket = io(wsUrl, {
                transports: ['websocket', 'polling']
            });
            
            socket.on('connect', () => {
                updateStatus('✅ Connected! Socket ID: ' + socket.id, 'connected');
                addMessage('✅ WebSocket connected successfully! ID: ' + socket.id);
            });
            
            socket.on('disconnect', (reason) => {
                updateStatus('❌ Disconnected: ' + reason, 'disconnected');
                addMessage('❌ WebSocket disconnected. Reason: ' + reason);
            });
            
            socket.on('connect_error', (error) => {
                updateStatus('❌ Connection Error', 'disconnected');
                addMessage('❌ Connection error: ' + error.message);
            });
            
            socket.on('connection_response', (data) => {
                addMessage('📨 Connection response: ' + JSON.stringify(data, null, 2));
            });
            
            socket.on('processing_progress', (data) => {
                addMessage(`📊 Progress Update: ${data.progress}% - ${data.step} - ${data.message}`);
            });
            
            socket.on('test_response', (data) => {
                addMessage('📩 Test response: ' + JSON.stringify(data, null, 2));
            });
        }
        
        function disconnect() {
            if (socket) {
                socket.disconnect();
                socket = null;
                updateStatus('🔴 Disconnected', 'disconnected');
                addMessage('🔴 Manually disconnected');
            }
        }
        
        function testMessage() {
            if (!socket?.connected) {
                addMessage('❌ Not connected! Click Connect first.', 'error');
                return;
            }
            
            const testData = {
                message: 'Hello from browser!',
                timestamp: new Date().toISOString(),
                random: Math.random()
            };
            
            socket.emit('test_message', testData);
            addMessage('📤 Sent test message: ' + JSON.stringify(testData));
        }
        
        function testProgress() {
            if (!socket?.connected) {
                addMessage('❌ Not connected! Click Connect first.', 'error');
                return;
            }
            
            const videoId = 'test-video-' + Date.now();
            socket.emit('subscribe_video_progress', { video_id: videoId });
            addMessage('📤 Subscribed to video progress: ' + videoId);
        }
        
        async function callProgressAPI() {
            const wsUrl = getWsUrl();
            const videoId = 'test-video-' + Date.now();
            const apiUrl = wsUrl + '/api/test-progress/' + videoId;
            
            addMessage('🌐 Calling API: ' + apiUrl);
            
            try {
                const response = await fetch(apiUrl, { method: 'POST' });
                const data = await response.json();
                addMessage('✅ API Response: ' + JSON.stringify(data));
                addMessage('📡 Watch for WebSocket progress updates above!');
            } catch (error) {
                addMessage('❌ API Error: ' + error.message);
            }
        }
        
        function clearMessages() {
            document.getElementById('messages').innerHTML = '';
            addMessage('🗑️ Messages cleared');
        }
        
        // Auto-connect on page load
        window.onload = () => {
            addMessage('👋 Welcome! Enter your backend URL and click Connect.');
            addMessage('💡 Tip: If using ngrok, your URL looks like: https://abc123.ngrok-free.app');
        };
    </script>
</body>
</html>
